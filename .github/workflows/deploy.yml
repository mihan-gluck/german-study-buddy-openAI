name: Deploy to EC2

on:
  push:
    branches:
      - main  # Deploy when pushing to main branch

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            set -e  # Exit on any error
            
            echo "🚀 Starting deployment..."
            
            # Check if project directory exists, if not clone it
            if [ ! -d "/home/ec2-user/Updated-Gluck-Portal" ]; then
              echo "📂 Project directory not found. Cloning repository..."
              cd /home/ec2-user
              git clone https://github.com/GluckSL/Updated-Gluck-Portal.git
              cd Updated-Gluck-Portal
              
              # Install dependencies for first time
              echo "📦 Installing dependencies (first time)..."
              npm install
              
              # Create .env file reminder
              echo "⚠️  IMPORTANT: You need to create .env file with credentials!"
              echo "⚠️  SSH into EC2 and create /home/ec2-user/Updated-Gluck-Portal/.env"
            else
              echo "📂 Project directory found. Updating..."
              cd /home/ec2-user/Updated-Gluck-Portal
              
              # Pull latest code from GitHub
              echo "📥 Pulling latest code from GitHub..."
              git pull origin main
              
              # Install/update dependencies
              echo "📦 Installing dependencies..."
              npm install
            fi
            
            # Build Angular frontend (Angular 19 syntax)
            echo "🔨 Building Angular frontend..."
            npm run build -- --configuration production
            
            # Restart backend with PM2
            echo "🔄 Restarting backend..."
            if pm2 list | grep -q "germanbuddy-backend"; then
              echo "Restarting existing PM2 process..."
              pm2 restart germanbuddy-backend
            else
              echo "Starting new PM2 process..."
              pm2 start app.js --name "germanbuddy-backend"
            fi
            
            # Save PM2 configuration
            pm2 save
            
            # Show PM2 status
            echo "✅ Deployment complete!"
            pm2 status
