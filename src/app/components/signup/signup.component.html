<!-- signup.component.html - FULL RESPONSIVE VERSION -->

<div class="signup-wrapper">
  <div class="signup-card" role="main">
    <h2 class="text-center text-primary mb-4">Create an Account</h2>

    <form (ngSubmit)="onSubmit()" #signupForm="ngForm">

      <!-- Role Selection -->
      <div class="mb-3">
        <label for="role" class="form-label">Role</label>
        <select
          id="role"
          name="role"
          [(ngModel)]="role"
          required
          class="form-select"
        >
          <option value="STUDENT">STUDENT</option>
          <option value="TEACHER">TEACHER</option>
          <option value="TEACHER_ADMIN">TEACHER ADMIN</option>
          <option value="ADMIN">ADMIN</option>
        </select>
      </div>

      <!-- Name -->
      <div class="mb-3">
        <label for="name" class="form-label">Full Name</label>
        <input
          type="text"
          id="name"
          name="name"
          [(ngModel)]="name"
          required
          placeholder="Enter your full name"
          class="form-control"
        />
      </div>

      <!-- Email -->
      <div class="mb-3">
        <label for="email" class="form-label">
          {{ role === 'ADMIN' || role === 'TEACHER' ? 'Email Address' : 'Email' }}
        </label>
        <input
          type="email"
          id="email"
          name="email"
          [(ngModel)]="email"
          required
          placeholder="you@example.com"
          class="form-control"
        />
      </div>

      <!-- Phone Number -->
      <div class="mb-3" *ngIf="role === 'STUDENT'">
        <label for="phoneNumber" class="form-label">Phone Number</label>
        <input
          type="text"
          id="phoneNumber"
          name="phoneNumber"
          [(ngModel)]="phoneNumber"
          class="form-control"
          placeholder="+94 77 123 4567"
        />
      </div>

      <!-- Address -->
      <div class="mb-3" *ngIf="role === 'STUDENT'">
        <label for="address" class="form-label">Address</label>
        <input
          type="text"
          id="address"
          name="address"
          [(ngModel)]="address"
          class="form-control"
          placeholder="Enter your full address"
        />
      </div>

      <!-- Age -->
      <div class="mb-3" *ngIf="role === 'STUDENT'">
        <label for="age" class="form-label">Age</label>
        <input
          type="number"
          id="age"
          name="age"
          [(ngModel)]="age"
          min="13"
          max="100"
          class="form-control"
        />
      </div>

      <!-- Services Opted -->
      <div class="mb-3" *ngIf="role === 'STUDENT'">
        <label for="servicesOpted" class="form-label">Services Opted</label>
        <input
          type="text"
          id="servicesOpted"
          name="servicesOpted"  
          [(ngModel)]="servicesOpted"
          class="form-control"
        />
      </div>

      <!-- Qualifications -->
      <div class="mb-3" *ngIf="role === 'STUDENT'">
        <label for="qualifications" class="form-label">Qualifications</label>
        <input
          type="text"
          id="qualifications"
          name="qualifications"
          [(ngModel)]="qualifications"
          class="form-control"
          placeholder="e.g., O/L, A/L, Degree"
        />
      </div>

      <!-- Language Level Opted -->
      <div class="mb-3" *ngIf="role === 'STUDENT'">
        <label for="languageLevelOpted" class="form-label">Language Level Opted</label>
        <select
          id="languageLevelOpted"
          name="languageLevelOpted"
          [(ngModel)]="languageLevelOpted"
          required
          class="form-select"
        >
          <option value="">Select level</option>
          <option value="A1">A1</option>
          <option value="A1-A2">A1-A2</option>
          <option value="A1-B1">A1-B1</option>
          <option value="A1-B2">A1-B2</option>
          <option value="A2">A2</option>
          <option value="A2-B1">A2-B1</option>
          <option value="A2-B2">A2-B2</option>
          <option value="B1">B1</option>
          <option value="B1-B2">B1-B2</option>
          <option value="B2">B2</option>
        </select>
      </div>

      <!-- Batch -->
      <div class="mb-3" *ngIf="role === 'STUDENT'">
        <label for="batch" class="form-label">Batch</label>
        <input
          type="text"
          id="batch"
          name="batch"
          [(ngModel)]="batch"
          required
          class="form-control"
          placeholder="e.g., Batch 2024-01"
        />
      </div>

      <!-- Assign Courses for Teacher -->
      <div *ngIf="role === 'TEACHER'" class="assign-courses-section">
        <label class="form-label mb-3 fw-semibold">Assign Courses</label>
        <div class="course-grid">
          <div class="course-item" *ngFor="let course of courses">
            <input 
              type="checkbox"
              [value]="course._id"
              (change)="onCourseChange($event, course._id)"
              [id]="course._id"
              class="course-checkbox"
            />
            <label [for]="course._id" class="course-label">{{ course.title }}</label>
          </div>
        </div>
        <small class="text-muted mt-2 d-block">Select one or more courses</small>
      </div>

      <!-- Assigned Batches -->
      <div class="mb-3" *ngIf="role === 'TEACHER'">
        <label for="assignedBatches" class="form-label">Assigned Batches (comma separated)</label>
        <input
          type="text"
          id="assignedBatches"
          name="assignedBatches"
          [(ngModel)]="assignedBatches"
          (ngModelChange)="onAssignedBatchesChange($event)"
          required
          placeholder="e.g., 1, 2, 5"
          class="form-control"
        />
      </div>

      <!-- Medium for STUDENT (single select) -->
      <div class="mb-3" *ngIf="role === 'STUDENT'">
        <label for="medium" class="form-label">Medium</label>
        <select
          id="medium"
          name="medium"
          [(ngModel)]="medium"
          (change)="loadTeachers()"
          required
          class="form-select"
        >
          <option value="">Select Medium</option>
          <option value="Tamil">Tamil</option>
          <option value="Sinhala">Sinhala</option>
          <option value="Malayalam">Malayalam</option>
          <option value="English">English</option>
        </select>
      </div>

      <!-- Medium for TEACHER (multi-select) -->
      <div class="mb-3" *ngIf="role === 'TEACHER'">
        <label for="teacherMedium" class="form-label">Medium (Select Multiple)</label>
        <select
          id="teacherMedium"
          name="medium"
          [(ngModel)]="medium"
          required
          class="form-select"
          multiple
          size="3"
        >
          <option value="Tamil">Tamil</option>
          <option value="Sinhala">Sinhala</option>
          <option value="Malayalam">Malayalam</option>
          <option value="English">English</option>
        </select>
        <small class="text-muted">Hold CTRL (Windows) or CMD (Mac) to select multiple</small>
      </div>

      <!-- Subscription -->
      <div class="mb-3" *ngIf="role === 'STUDENT'">
        <label for="subscription" class="form-label">Subscription Plan</label>
        <select
          id="subscription"
          name="subscription"
          [(ngModel)]="subscription"
          required
          class="form-select"
        >
          <option value="">Select Plan</option>
          <option value="SILVER">Silver</option>
          <option value="PLATINUM">Platinum</option>
        </select>
      </div>

      <!-- Level -->
      <div class="mb-3" *ngIf="role === 'STUDENT'">
        <label for="level" class="form-label">CEFR Level</label>
        <select
          id="level"
          name="level"
          [(ngModel)]="level"
          (change)="loadTeachers()"
          required
          class="form-select"
        >
          <option value="">Select Level</option>
          <option value="A1">A1</option>
          <option value="A2">A2</option>
          <option value="B1">B1</option>
          <option value="B2">B2</option>
          <option value="C1">C1</option>
          <option value="C2">C2</option>
        </select>
      </div>

      <!-- Status for STUDENT (single select) -->
      <div class="mb-3" *ngIf="role === 'STUDENT'">
        <label for="studentStatus" class="form-label">Status</label>
        <select
          id="studentStatus"
          name="studentStatus"
          [(ngModel)]="studentStatus"
          required
          class="form-select"
        >
          <option value="UNCERTAIN">Uncertain</option>
          <option value="ONGOING">Ongoing</option>
          <option value="COMPLETED">Completed</option>
          <option value="WITHDREW">Withdrew</option>
        </select>
      </div>

      <!-- Date Withdrew -->
      <div class="mb-3" *ngIf="role === 'STUDENT' && studentStatus === 'WITHDREW'">
        <label for="dateWithdrew" class="form-label">Date Withdrew</label>
        <input
          type="date"
          id="dateWithdrew"
          name="dateWithdrew"
          [(ngModel)]="dateWithdrew"
          class="form-control"
        />
      </div>

      <!-- Reason for Withdrawing -->
      <div class="mb-3" *ngIf="role === 'STUDENT' && studentStatus === 'WITHDREW'">
        <label for="reasonForWithdrawing" class="form-label">Reason for Withdrawing</label>
        <input
          type="text"
          id="reasonForWithdrawing"
          name="reasonForWithdrawing"
          [(ngModel)]="reasonForWithdrawing"
          class="form-control"
          placeholder="Enter reason for withdrawal"
        />
      </div>

      <!-- Course Start & Completion Dates for STUDENT -->
      <div class="mb-4" *ngIf="role === 'STUDENT'">
        <h6 class="mb-3">Course Timeline</h6>
        
        <!-- A1 Dates -->
        <div class="row mb-3" *ngIf="level === 'A1' || level === 'A2' || level === 'B1' || level === 'B2'">
          <div class="col-md-6">
            <label class="form-label small">A1 Start Date</label>
            <input
              type="date"
              class="form-control"
              [(ngModel)]="courseStartDates.A1StartDate"
              name="A1StartDate"
            />
          </div>
          <div class="col-md-6">
            <label class="form-label small">A1 Completed On</label>
            <input
              type="date"
              class="form-control"
              [(ngModel)]="courseCompletionDates.A1CompletionDate"
              name="A1CompletionDate"
            />
          </div>
        </div>

        <!-- A2 Dates -->
        <div class="row mb-3" *ngIf="level === 'A2' || level === 'B1' || level === 'B2'">
          <div class="col-md-6">
            <label class="form-label small">A2 Start Date</label>
            <input
              type="date"
              class="form-control"
              [(ngModel)]="courseStartDates.A2StartDate"
              name="A2StartDate"
            />
          </div>
          <div class="col-md-6">
            <label class="form-label small">A2 Completed On</label>
            <input
              type="date"
              class="form-control"
              [(ngModel)]="courseCompletionDates.A2CompletionDate"
              name="A2CompletionDate"
            />
          </div>
        </div>

        <!-- B1 Dates -->
        <div class="row mb-3" *ngIf="level === 'B1' || level === 'B2'">
          <div class="col-md-6">
            <label class="form-label small">B1 Start Date</label>
            <input
              type="date"
              class="form-control"
              [(ngModel)]="courseStartDates.B1StartDate"
              name="B1StartDate"
            />
          </div>
          <div class="col-md-6">
            <label class="form-label small">B1 Completed On</label>
            <input
              type="date"
              class="form-control"
              [(ngModel)]="courseCompletionDates.B1CompletionDate"
              name="B1CompletionDate"
            />
          </div>
        </div>

        <!-- B2 Dates -->
        <div class="row mb-3" *ngIf="level === 'B2'">
          <div class="col-md-6">
            <label class="form-label small">B2 Start Date</label>
            <input
              type="date"
              class="form-control"
              [(ngModel)]="courseStartDates.B2StartDate"
              name="B2StartDate"
            />
          </div>
          <div class="col-md-6">
            <label class="form-label small">B2 Completed On</label>
            <input
              type="date"
              class="form-control"
              [(ngModel)]="courseCompletionDates.B2CompletionDate"
              name="B2CompletionDate"
            />
          </div>
        </div>
      </div>

      <!-- Select Teacher (only for Students) -->
      <div class="mb-4" *ngIf="role === 'STUDENT'">
        <label for="assignedTeacher" class="form-label">Assign Teacher</label>
        <select 
          id="assignedTeacher" 
          [(ngModel)]="assignedTeacher" 
          name="assignedTeacher" 
          required 
          class="form-select"
        >
          <option value="">Select teacher</option>
          <option *ngFor="let teacher of teachers" [value]="teacher._id">
            {{ teacher.name }} ({{ teacher.regNo }})
          </option>
        </select>
      </div>

      <!-- Lead Source -->
      <div class="mb-4" *ngIf="role === 'STUDENT'">
        <label for="leadSource" class="form-label">Lead Source</label>
        <input
          type="text"
          id="leadSource"
          name="leadSource"
          [(ngModel)]="leadSource"
          class="form-control"
          placeholder="e.g., Facebook, Walk-in, Referral"
        />
      </div>

      <!-- Submit Button -->
      <button
        type="submit"
        [disabled]="!signupForm.form.valid"
        class="btn-submit"
      >
        {{ isEditMode ? 'Update' : 'Register' }}
      </button>
    </form>
  </div>
</div>
