<div class="assigned-assignments-card">
  <h3>Assigned Exams & Assignments</h3>

  <div *ngIf="loading">Loading assigned work...</div>
  <p class="text-danger" *ngIf="error">{{ error }}</p>

  <div *ngIf="!loading && templates.length === 0">
    No exams or assignments assigned yet.
  </div>

  <ul class="assigned-list" *ngIf="!loading && templates.length">
    <li *ngFor="let t of templates">
      <div class="title-row">
        <span class="title">{{ t.title }}</span>

        <!-- Download button -->
        <a
          *ngIf="t.files.length"
          class="download-btn"
          [href]="getFileUrl(t.files[0])"
          target="_blank"
          rel="noopener"
          download
        >
          Download "{{ t.title }}"
        </a>
      </div>

      <div class="meta">
        <span *ngIf="t.dueDate">
          Due: {{ t.dueDate | date:'mediumDate' }}
        </span>
        <span *ngIf="t.teacherId">
          By: {{ t.teacherId.name }}
        </span>
      </div>

      <p class="description" *ngIf="t.description">
        {{ t.description }}
      </p>

      <!-- Optional: show all files -->
      <div class="files" *ngIf="t.files.length">
        <span>Files:</span>
        <a
          *ngFor="let f of t.files"
          [href]="getFileUrl(f)"
          target="_blank"
          rel="noopener"
        >
          {{ f.originalName }}
        </a>
      </div>
    </li>
  </ul>
</div>
