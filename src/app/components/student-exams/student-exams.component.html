<div class="dashboard-container">
  <div class="page-header">
    <h1>Exams &amp; Assignments</h1>
    <p>
      Download exam papers, upload your written answers, and see your assigned
      work and notifications in one place.
    </p>
  </div>

  <div class="exams-layout">
    <!-- Left: upload + your submissions -->
    <section class="card-block">
      <app-student-assignments></app-student-assignments>
    </section>

    <!-- Right: assigned exams + notifications -->
    <section class="card-block">
      <app-student-assigned-assignments></app-student-assigned-assignments>

      <!-- If you want notifications also on this page -->
      <app-student-notifications></app-student-notifications>
    </section>
  </div>
</div>
