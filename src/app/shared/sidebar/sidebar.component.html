<nav class="sidebar">
  <!-- Header -->
  <div class="sidebar-header">
    <div class="sidebar-logo" [style.background]="roleColor">G</div>
    <div class="brand-info">
      <div class="brand-name">Glück Global</div>
    </div>
    <div class="role-badge" [style.background]="badgeColor">
      {{ userRole }}
    </div>
  </div>

  <!-- Nav Groups -->
  <div class="nav-body">
    <div *ngFor="let group of navGroups" class="nav-group">
      <div class="group-header" (click)="toggle(group.group)">
        <span>{{ group.group }}</span>
        <span class="chevron">{{ collapsed[group.group] ? '▸' : '▾' }}</span>
      </div>
      <div class="group-items" [class.collapsed]="collapsed[group.group]">
        <a
          *ngFor="let item of group.items"
          class="nav-item"
          [routerLink]="getRoute(item)"
          routerLinkActive="active"
          (click)="closeSidebar.emit()">
          <span class="nav-icon">{{ item.icon }}</span>
          <span class="nav-label">{{ item.label }}</span>
        </a>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div class="sidebar-footer">
    <a class="nav-item profile-link" routerLink="/profile" routerLinkActive="active" (click)="closeSidebar.emit()">
      <div class="avatar" [style.background]="roleColor">
        {{ initials }}
      </div>
      <div class="profile-info">
        <div class="profile-name">{{ userName }}</div>
        <div class="profile-role">{{ userRole }}</div>
      </div>
    </a>
    <button class="logout-btn" (click)="logout()">🔴 Logout</button>
  </div>
</nav>
